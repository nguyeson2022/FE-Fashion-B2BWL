<!-- MINI TOP HEADER -->
<div class="top-announcement">
  <span>FREE SHIPPING ON ORDERS OVER 1.000.000 VNĐ</span>
</div>

<!-- DOSI-IN STYLE HEADER -->
<header class="store-header">
  <div class="header-container">
    <div class="header-left">
      <a routerLink="/storefront" class="logo">
        <span class="brand">DOSI-IN</span>
        <span class="clone">CLONE</span>
      </a>
    </div>

    <nav class="header-center">
      <ul class="nav-links">
        <li *ngFor="let cat of categories"><a href="javascript:void(0)">{{ cat }}</a></li>
      </ul>
    </nav>

    <div class="header-right">
      <div class="search-bar">
        <tui-icon icon="@tui.search" class="search-icon"></tui-icon>
        <input type="text" placeholder="Search brands, products...">
      </div>

      <div class="auth-box" *ngIf="user$ | async as user; else noUser">
        <button
          tuiButton
          type="button"
          appearance="flat"
          size="m"
          [(tuiDropdownOpen)]="dropdownOpen"
          [tuiDropdown]="userMenu"
        >
          <tui-icon icon="@tui.user"></tui-icon>
          <span class="ms-1">{{ user.fullName }}</span>
          <tui-icon icon="@tui.chevron-down" class="ms-1 dropdown-chevron"></tui-icon>
        </button>
        <ng-template #userMenu>
          <tui-data-list>
            <button tuiOption routerLink="/profile">
              <tui-icon icon="@tui.user" class="me-2"></tui-icon>
              Profile
            </button>
            <button *ngIf="user.role === 'ADMIN' || user.role === 'STAFF'" tuiOption routerLink="/dashboard">
              <tui-icon icon="@tui.layout-dashboard" class="me-2"></tui-icon>
              Admin Dashboard
            </button>
            <button tuiOption (click)="logout()">
              <tui-icon icon="@tui.log-out" class="me-2"></tui-icon>
              Logout
            </button>
          </tui-data-list>
        </ng-template>
      </div>
      <ng-template #noUser>
        <div class="auth-links">
          <a routerLink="/login">LOGIN</a>
          <span class="sep">/</span>
          <a routerLink="/register">REGISTER</a>
        </div>
      </ng-template>

      <div class="cart-icon">
        <tui-icon icon="@tui.shopping-bag"></tui-icon>
      </div>
    </div>
  </div>
</header>
